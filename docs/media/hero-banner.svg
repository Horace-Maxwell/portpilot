  <text x="176" y="188" fill="#F8FAFC" font-family="Helvetica, Arial, sans-serif" font-size="58" font-weight="700">PortPilot</text>
  <text x="176" y="236" fill="#9FB1CD" font-family="Helvetica, Arial, sans-serif" font-size="19">Control every local repo</text>
  <text x="176" y="262" fill="#9FB1CD" font-family="Helvetica, Arial, sans-serif" font-size="19">from one desktop surface.</text>

  <text x="176" y="320" fill="#67D0FF" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="0.08em">IMPORT • RUN • ROUTE</text>

