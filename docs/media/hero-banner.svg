  <text x="686" y="274" fill="#F8FAFC" font-family="Helvetica, Arial, sans-serif" font-size="35" font-weight="700">Run a repo and keep</text>
  <text x="686" y="314" fill="#F8FAFC" font-family="Helvetica, Arial, sans-serif" font-size="35" font-weight="700">everything in sight.</text>
  <text x="686" y="346" fill="#9FB1CD" font-family="Helvetica, Arial, sans-serif" font-size="16">Import from GitHub, apply env values, route it to `.localhost`,</text>
  <text x="686" y="370" fill="#9FB1CD" font-family="Helvetica, Arial, sans-serif" font-size="16">and watch runtime health without jumping between tools.</text>

