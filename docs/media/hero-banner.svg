  <rect x="134" y="126" width="352" height="468" rx="24" fill="#0D1525"/>
  <text x="168" y="184" fill="#F8FAFC" font-family="SF Pro Display, Inter, Arial" font-size="54" font-weight="700">PortPilot</text>
  <text x="168" y="232" fill="#94A3B8" font-family="SF Pro Text, Inter, Arial" font-size="22">One desktop console for local-first GitHub repos.</text>
  <rect x="168" y="278" width="132" height="38" rx="19" fill="#0EA5E9"/>
  <text x="196" y="303" fill="#F8FAFC" font-family="SF Pro Text, Inter, Arial" font-size="17" font-weight="700">Import</text>
  <rect x="314" y="278" width="132" height="38" rx="19" fill="#1E293B"/>
  <text x="339" y="303" fill="#E2E8F0" font-family="SF Pro Text, Inter, Arial" font-size="17" font-weight="700">Run / Stop</text>
  <text x="168" y="364" fill="#E2E8F0" font-family="SF Pro Text, Inter, Arial" font-size="18" font-weight="600">GitHub repo intake</text>
  <text x="168" y="392" fill="#94A3B8" font-family="SF Pro Text, Inter, Arial" font-size="16">Clone, inspect scripts, parse env files,</text>
  <text x="168" y="416" fill="#94A3B8" font-family="SF Pro Text, Inter, Arial" font-size="16">and build a runnable project profile automatically.</text>
  <text x="168" y="476" fill="#E2E8F0" font-family="SF Pro Text, Inter, Arial" font-size="18" font-weight="600">Unified local routing</text>
  <text x="168" y="504" fill="#94A3B8" font-family="SF Pro Text, Inter, Arial" font-size="16">Projects get a clean `.localhost` entrypoint</text>
  <text x="168" y="528" fill="#94A3B8" font-family="SF Pro Text, Inter, Arial" font-size="16">with logs, ports, and health in one place.</text>
