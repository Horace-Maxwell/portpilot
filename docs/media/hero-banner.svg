  <text x="910" y="434" fill="#67E8F9" font-family="SF Pro Text, Inter, Arial" font-size="14" font-weight="700">Routes + Logs</text>
  <rect x="888" y="466" width="224" height="36" rx="18" fill="#0F172A"/>
  <text x="912" y="489" fill="#E2E8F0" font-family="SF Pro Text, Inter, Arial" font-size="15">gateway.localhost/p/crucix</text>
  <text x="912" y="533" fill="#94A3B8" font-family="SF Mono, Menlo, monospace" font-size="14">[stdout] dev server ready on :3117</text>
  <text x="912" y="559" fill="#94A3B8" font-family="SF Mono, Menlo, monospace" font-size="14">[route ] mapped to crucix.localhost</text>
