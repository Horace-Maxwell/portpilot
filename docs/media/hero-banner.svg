  <text x="542" y="364" fill="#9BDFFF" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700">Project A</text>
  <text x="542" y="383" fill="#F8FAFC" font-family="Helvetica, Arial, sans-serif" font-size="19" font-weight="700">Crucix</text>
  <rect x="516" y="404" width="122" height="54" rx="18" fill="#111C31"/>
  <text x="542" y="434" fill="#92A4BF" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700">Project B</text>
  <text x="542" y="453" fill="#E5EDF8" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700">worldmonitor</text>
  <rect x="516" y="474" width="122" height="54" rx="18" fill="#111C31"/>
  <text x="542" y="504" fill="#92A4BF" font-family="Helvetica, Arial, sans-serif" font-size="13" font-weight="700">Project C</text>
  <text x="542" y="523" fill="#E5EDF8" font-family="Helvetica, Arial, sans-serif" font-size="18" font-weight="700">API sandbox</text>

