  <text x="808" y="271" fill="#E2E8F0" font-family="SF Pro Text, Inter, Arial" font-size="18" font-weight="700">worldmonitor</text>
  <rect x="954" y="238" width="130" height="52" rx="16" fill="#1D4ED8"/>
