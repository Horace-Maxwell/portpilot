<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="78" y1="42" x2="1174" y2="702" gradientUnits="userSpaceOnUse">
      <stop stop-color="#09101F"/>
      <stop offset="1" stop-color="#14213C"/>
    </linearGradient>
    <linearGradient id="shell" x1="118" y1="96" x2="1128" y2="616" gradientUnits="userSpaceOnUse">
      <stop stop-color="#16233D"/>
      <stop offset="1" stop-color="#121B2F"/>
    </linearGradient>
    <linearGradient id="panel" x1="136" y1="126" x2="456" y2="544" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#10192D"/>
